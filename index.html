        { id: 99, name: "红薯条", category: "西餐", practice: "红薯切条裹淀粉炸或烤撒盐辣椒粉。", rating: "★★★★★" },
        { id: 100, name: "巧克力熔岩蛋糕", category: "西餐", practice: "面糊半烤中心未熟流出巧克力浆。", rating: "★★★★★" }
    ];
    
    // 全局变量
    let currentCategory = "全部";
    let selectedDishesMap = new Map();
    let orderRecords = [];
    let realtimeChannel = null;
    
    // DOM 元素
    const dishesGrid = document.getElementById("dishesGrid");
    const categoryBar = document.getElementById("categoryBar");
    const orderDateInput = document.getElementById("orderDate");
    const submitBtn = document.getElementById("submitOrderBtn");
    const coolModal = document.getElementById("coolConfirmModal");
    const confirmDishesContainer = document.getElementById("confirmDishesList");
    const cancelConfirm = document.getElementById("cancelConfirmBtn");
    const proceedConfirm = document.getElementById("proceedConfirmBtn");
    const floatRecordList = document.getElementById("floatRecordList");
    const refreshFloatBtn = document.getElementById("refreshFloatBtn");
    const floatHeader = document.getElementById("floatHeader");
    const floatContent = document.getElementById("floatContent");
    const toggleIcon = document.getElementById("toggleFloatIcon");
    const syncStatusSpan = document.getElementById("syncStatus");
    
    let pendingOrderData = null;
    
    // ========== Supabase 实时同步 ==========
    async function loadOrdersFromSupabase() {
        try {
            syncStatusSpan.innerHTML = "🔄 加载中...";
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            orderRecords = data || [];
            renderFloatHistory();
            syncStatusSpan.innerHTML = "☁️ 已同步";
            setTimeout(() => {
                if (syncStatusSpan.innerHTML === "☁️ 已同步") syncStatusSpan.innerHTML = "☁️ 实时";
            }, 2000);
        } catch (err) {
            console.error('加载订单失败:', err);
            syncStatusSpan.innerHTML = "⚠️ 同步出错";
        }
    }
    
    // 订阅实时变更 - 核心：所有设备自动收到新订单 [citation:3][citation:8]
    function subscribeToOrders() {
        if (realtimeChannel) {
            supabase.removeChannel(realtimeChannel);
        }
        
        realtimeChannel = supabase
            .channel('orders-channel')
            .on(
                'postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'orders' },
                (payload) => {
                    // 新订单插入，立即更新所有设备
                    const newOrder = payload.new;
                    orderRecords.unshift(newOrder);  // 添加到开头
                    renderFloatHistory();
                    syncStatusSpan.innerHTML = "✨ 新订单!";
                    setTimeout(() => {
                        if (syncStatusSpan.innerHTML === "✨ 新订单!") syncStatusSpan.innerHTML = "☁️ 实时";
                    }, 1500);
                }
            )
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('✅ 已订阅实时订单变更');
                }
            });
    }
    
    // 添加订单到 Supabase
    async function addOrderToSupabase(diner, orderDate, dishesList) {
        try {
            const { data, error } = await supabase
                .from('orders')
                .insert([
                    {
                        diner: diner,
                        order_date: orderDate,
                        dishes_list: dishesList,
                        created_at: new Date().toISOString()
                    }
                ])
                .select();
            
            if (error) throw error;
            return true;
        } catch (err) {
            console.error('保存订单失败:', err);
            alert('保存失败：' + err.message);
            return false;
        }
    }
    
    // 渲染当月记录
    function renderFloatHistory() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;
        const filtered = orderRecords.filter(rec => {
            if (!rec.order_date) return false;
            const [year, month] = rec.order_date.split('-');
            return parseInt(year) === currentYear && parseInt(month) === currentMonth;
        });
        
        if (filtered.length === 0) {
            floatRecordList.innerHTML = '<div class="empty-record">🌱 本月暂无点单，快来选菜~</div>';
            return;
        }
        
        let html = '';
        filtered.forEach(rec => {
            const dishes = rec.dishes_list || [];
            html += `
                <div class="record-item-mini">
                    <div class="record-header-mini">
                        <span>${escapeHtml(rec.diner)}</span>
                        <span>${rec.order_date}</span>
                    </div>
                    <div>${escapeHtml(dishes.join('、'))}</div>
                </div>
            `;
        });
        floatRecordList.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 日期初始化
    function updateDateAndWeek() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2,'0');
        const dd = String(today.getDate()).padStart(2,'0');
        const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
        const weekday = weekdays[today.getDay()];
        document.getElementById("currentDateDisplay").innerHTML = `${yyyy}.${mm}.${dd} <span>${weekday}</span>`;
        const todayStr = `${yyyy}-${mm}-${dd}`;
        const maxDate = new Date(today);
        maxDate.setDate(today.getDate() + 7);
        const maxStr = maxDate.toISOString().slice(0,10);
        orderDateInput.min = todayStr;
        orderDateInput.max = maxStr;
        if (!orderDateInput.value) orderDateInput.value = todayStr;
    }
    
    // 分类渲染
    function renderCategories() {
        const cats = ["全部", "中餐", "西餐"];
        categoryBar.innerHTML = '';
        cats.forEach(cat => {
            const btn = document.createElement('div');
            btn.classList.add('cat-btn');
            if (cat === currentCategory) btn.classList.add('active');
            btn.innerText = cat;
            btn.addEventListener('click', () => {
                currentCategory = cat;
                renderCategories();
                renderDishes();
            });
            categoryBar.appendChild(btn);
        });
    }
    
    // 菜品渲染
    function renderDishes() {
        let filtered = currentCategory === "全部" ? [...FULL_MENU] : FULL_MENU.filter(d => d.category === currentCategory);
        dishesGrid.innerHTML = '';
        filtered.forEach(dish => {
            const isChecked = selectedDishesMap.get(dish.id) === true;
            const card = document.createElement('div');
            card.className = 'dish-card';
            card.innerHTML = `
                <div class="dish-name">${escapeHtml(dish.name)}</div>
                <div class="rating">${dish.rating}</div>
                <div class="cat-tag" style="font-size:0.7rem; background:#e9f3e4; display:inline-block; padding:0.2rem 0.6rem; border-radius:30px;">${dish.category}</div>
                <div class="checkbox-area">
                    <input type="checkbox" id="chk_${dish.id}" ${isChecked ? 'checked' : ''}>
                    <label for="chk_${dish.id}">✅ 点这道菜</label>
                </div>
                <button class="detail-btn" data-practice="${escapeHtml(dish.practice)}" data-name="${escapeHtml(dish.name)}">📖 做法 tips</button>
            `;
            const chk = card.querySelector('input');
            chk.addEventListener('change', () => {
                selectedDishesMap.set(dish.id, chk.checked);
            });
            const detailBtn = card.querySelector('.detail-btn');
            detailBtn.addEventListener('click', () => {
                const name = detailBtn.getAttribute('data-name');
                const practice = detailBtn.getAttribute('data-practice');
                alert(`🍳 ${name}\n做法：${practice}`);
            });
            dishesGrid.appendChild(card);
        });
    }
    
    // 模态框
    function showCoolConfirm(diner, orderDate, selectedDishesArray) {
        const dishNames = selectedDishesArray.map(d => d.name);
        confirmDishesContainer.innerHTML = dishNames.map(name => `<div class="selected-dish-item">🍽️ ${escapeHtml(name)}</div>`).join('');
        coolModal.style.display = 'flex';
        pendingOrderData = { diner, orderDate, selectedDishes: selectedDishesArray };
    }
    
    function closeModal() {
        coolModal.style.display = 'none';
        pendingOrderData = null;
    }
    
    async function finalSubmitOrder() {
        if (!pendingOrderData) return;
        const { diner, orderDate, selectedDishes } = pendingOrderData;
        const dishNames = selectedDishes.map(d => d.name);
        const success = await addOrderToSupabase(diner, orderDate, dishNames);
        if (success) {
            selectedDishesMap.clear();
            renderDishes();
            closeModal();
            alert(`✅ 点餐已同步！${diner} 在 ${orderDate} 点了 ${dishNames.length} 道美味，所有设备将实时更新~`);
        }
    }
    
    function onMainSubmit() {
        const selectedIds = [];
        for (let [id, checked] of selectedDishesMap.entries()) if (checked) selectedIds.push(id);
        const selectedDishes = FULL_MENU.filter(d => selectedIds.includes(d.id));
        if (selectedDishes.length === 0) {
            alert("请至少选择一道菜品 🌟");
            return;
        }
        const diner = document.querySelector('input[name="diner"]:checked').value;
        const orderDate = orderDateInput.value;
        if (!orderDate) { alert("请选择点餐日期"); return; }
        const today = new Date().toISOString().slice(0,10);
        if (orderDate < today || orderDate > new Date(Date.now() + 7*86400000).toISOString().slice(0,10)) {
            alert("点餐日期需在今天~未来一周内");
            return;
        }
        showCoolConfirm(diner, orderDate, selectedDishes);
    }
    
    // 浮动面板
    let isFloatCollapsed = false;
    function toggleFloatPanel() {
        isFloatCollapsed = !isFloatCollapsed;
        if (isFloatCollapsed) {
            floatContent.classList.add('collapsed');
            toggleIcon.innerHTML = '▲';
        } else {
            floatContent.classList.remove('collapsed');
            toggleIcon.innerHTML = '▼';
        }
    }
    
    // 初始化
    async function init() {
        updateDateAndWeek();
        renderCategories();
        renderDishes();
        await loadOrdersFromSupabase();
        subscribeToOrders();
        
        submitBtn.addEventListener('click', onMainSubmit);
        cancelConfirm.addEventListener('click', closeModal);
        proceedConfirm.addEventListener('click', finalSubmitOrder);
        refreshFloatBtn.addEventListener('click', loadOrdersFromSupabase);
        floatHeader.addEventListener('click', toggleFloatPanel);
        coolModal.addEventListener('click', (e) => { if (e.target === coolModal) closeModal(); });
    }
    
    init();
</script>
